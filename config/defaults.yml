reviewer:
  enabled: true
  model: "claude-haiku"
  max_retries: 3
  diff_limit_kb: 65
  severity_tiers: true

states:
  - Backlog
  - Ready
  - In Progress
  - In Review
  - Awaiting Human
  - Done
  - Cancelled

transitions:
  "Backlog -> Ready": {}
  "Ready -> In Progress":
    require: [assignee]
  "Ready -> Backlog": {}
  "In Progress -> In Review":
    require: [linked_pr]
  "In Progress -> Awaiting Human": {}
  "In Progress -> Ready": {}
  "In Review -> Done":
    require: [merged_pr]
  "In Review -> In Progress":
    auto: true
    on: review_rejected
  "In Review -> Awaiting Human": {}
  "Awaiting Human -> In Progress": {}
  "Awaiting Human -> In Review":
    require: [open_pr]
  "* -> Cancelled": {}
  "Cancelled -> Backlog": {}

pause:
  reminder_hours: 24
  reasons:
    - decision
    - ui-review
    - external-action
    - agent-stuck
    - review-escalation

notifications:
  stale_days: 3
  daily_summary: true
  daily_summary_cron: "0 12 * * *"
