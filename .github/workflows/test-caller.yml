name: Test Caller
on:
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string

jobs:
  call-review:
    uses: ./.github/workflows/pr-review.yml
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FLUENT_FLOW_URL: ${{ secrets.FLUENT_FLOW_URL }}
