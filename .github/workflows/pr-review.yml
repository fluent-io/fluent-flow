name: PR Review (Fluent Flow)

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      attempt:
        description: "Review attempt number"
        required: false
        type: string
        default: "1"
      prior_issues:
        description: "JSON array of issues from prior attempts"
        required: false
        type: string
        default: "[]"
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key for Claude"
        required: true
      FLUENT_FLOW_URL:
        description: "Fluent Flow service URL"
        required: false

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Test
        run: echo "PR number is ${{ inputs.pr_number }}"
