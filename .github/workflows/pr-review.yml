name: PR Review (Fluent Flow)

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      attempt:
        description: "Review attempt number (for retry tracking)"
        required: false
        type: string
        default: "1"
      prior_issues:
        description: "JSON array of issues from prior attempts"
        required: false
        type: string
        default: "[]"
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key for Claude"
        required: true
      FLUENT_FLOW_URL:
        description: "Fluent Flow service URL to post review results"
        required: false

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR diff
        id: fetch_diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIFF=\$(gh pr diff ${{ inputs.pr_number }} --patch 2>/dev/null | head -c 66560)
          if [ -z "\$DIFF" ]; then
            echo "ERROR: Could not fetch PR diff" >&2
            exit 1
          fi
          echo "\$DIFF" > /tmp/pr.diff
          DIFF_SIZE=\$(wc -c < /tmp/pr.diff)
          echo "diff_size=\${DIFF_SIZE}" >> \$GITHUB_OUTPUT
          echo "Fetched diff: \${DIFF_SIZE} bytes"

      - name: Fetch PR metadata
        id: pr_meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=\$(gh pr view ${{ inputs.pr_number }} --json title,body,author,baseRefName,headRefName,files)
          echo "\$PR_JSON" > /tmp/pr_meta.json
          TITLE=\$(echo "\$PR_JSON" | jq -r '.title')
          echo "pr_title=\${TITLE}" >> \$GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk@0.27.0 --no-save

      - name: Download scripts from fluent-flow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download the review script from the fluent-flow repo
          curl -s -H "Authorization: Bearer \$GH_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            -o /tmp/review.mjs \
            https://api.github.com/repos/fluent-io/fluent-flow/contents/scripts/review.js
          
          # Download the post-review script
          curl -s -H "Authorization: Bearer \$GH_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            -o /tmp/post-review.sh \
            https://api.github.com/repos/fluent-io/fluent-flow/contents/scripts/post-review.sh
          
          chmod +x /tmp/post-review.sh

      - name: Review with Claude
        id: claude_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ steps.pr_meta.outputs.pr_title }}
          ATTEMPT: ${{ inputs.attempt }}
          PRIOR_ISSUES: ${{ inputs.prior_issues }}
        run: |
          # Write system prompt to separate file (base64 to avoid YAML parsing issues)
          echo '' | base64 -d > /tmp/system_prompt.txt

          # Write the runner script without heredoc
          echo 'import { reviewPR } from "/tmp/review.mjs";' > /tmp/run_review.mjs
          echo 'import fs from "fs";' >> /tmp/run_review.mjs
          echo '' >> /tmp/run_review.mjs
          echo 'const diff = fs.readFileSync("/tmp/pr.diff", "utf8");' >> /tmp/run_review.mjs
          echo 'const prMeta = JSON.parse(fs.readFileSync("/tmp/pr_meta.json", "utf8"));' >> /tmp/run_review.mjs
          echo 'const attempt = parseInt(process.env.ATTEMPT || "1", 10);' >> /tmp/run_review.mjs
          echo 'const priorIssues = JSON.parse(process.env.PRIOR_ISSUES || "[]");' >> /tmp/run_review.mjs
          echo 'const systemPrompt = fs.readFileSync("/tmp/system_prompt.txt", "utf8");' >> /tmp/run_review.mjs
          echo '' >> /tmp/run_review.mjs
          echo 'try {' >> /tmp/run_review.mjs
          echo '  const result = await reviewPR({' >> /tmp/run_review.mjs
          echo '    diff,' >> /tmp/run_review.mjs
          echo '    prMeta,' >> /tmp/run_review.mjs
          echo '    attempt,' >> /tmp/run_review.mjs
          echo '    priorIssues,' >> /tmp/run_review.mjs
          echo '    systemPrompt,' >> /tmp/run_review.mjs
          echo '  });' >> /tmp/run_review.mjs
          echo '  fs.writeFileSync("/tmp/review_result.json", JSON.stringify(result, null, 2));' >> /tmp/run_review.mjs
          echo '  console.log("Review result:", JSON.stringify(result));' >> /tmp/run_review.mjs
          echo '} catch (err) {' >> /tmp/run_review.mjs
          echo '  console.error("Review failed:", err.message);' >> /tmp/run_review.mjs
          echo '  process.exit(1);' >> /tmp/run_review.mjs
          echo '}' >> /tmp/run_review.mjs
          echo '' >> /tmp/run_review.mjs

          node /tmp/run_review.mjs

      - name: Post review to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          /tmp/post-review.sh "${{ inputs.pr_number }}" "${{ inputs.attempt }}" /tmp/review_result.json

      - name: Notify Fluent Flow service
        if: ${{ secrets.FLUENT_FLOW_URL != '' }}
        env:
          FLUENT_FLOW_URL: ${{ secrets.FLUENT_FLOW_URL }}
        run: |
          curl -sf -X POST "\${FLUENT_FLOW_URL}/api/review/result" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"pr_number\":${{ inputs.pr_number }},\"result\":\$(cat /tmp/review_result.json)}" \
            || echo "Warning: Failed to notify Fluent Flow service"
